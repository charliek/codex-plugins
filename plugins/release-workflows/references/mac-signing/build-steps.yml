# Mac Developer ID signing + notarization — steps woven into the mac build job.
#
# NOT a standalone job. These are (a) a job-level `env:` gate and (b) steps that
# interleave with the existing mac build job. See README.md in this directory
# for the model + the ordering trap.
#
# All-or-nothing: CAN_NOTARIZE requires the FULL six-secret set. A
# signed-but-un-notarized DMG is still Gatekeeper-blocked, so signing without
# notarizing has no value — and a partial secret rollout must fall back to a
# clean ad-hoc build (first-launch note intact, build green), not break or
# half-sign. So the identity reaches the bundle/DMG steps and the notarize step
# runs ONLY when all six secrets are present.
#
# Steps below are indented 6 spaces to sit under `    steps:`; the env block is
# 4 spaces to sit under the job. Replace placeholders:
#   <APP>              — env-var prefix, e.g. ROOST, SHED_DESKTOP
#   <KEYCHAIN_NAME>    — any unique name, e.g. roost-signing
#   <DMG_PATH_EXPR>    — shell expr for the built DMG, e.g.
#                        build/MyApp-${GITHUB_REF_NAME#v}.dmg
#   <NOTARIZE_SCRIPT>  — path to the repo's notarize.sh, e.g. ./scripts/notarize.sh
#   <BUNDLE_STEP> / <DMG_STEP> — the repo's existing "build the .app" and
#                        "package the DMG" steps (repo-specific; shown below only
#                        for where to add the identity env)

# --- (a) add to the mac build job's `env:` (4-space indent) ---
    env:
      CAN_NOTARIZE: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 != '' && secrets.MACOS_CERTIFICATE_PASSWORD != '' && secrets.<APP>_DEVELOPER_ID_IDENTITY != '' && secrets.APPLE_ID != '' && secrets.APPLE_TEAM_ID != '' && secrets.APPLE_APP_SPECIFIC_PASSWORD != '' }}

# --- (b) steps (6-space indent) ---

      # BEFORE the bundle step. Imports the Developer ID Application cert into a
      # throwaway keychain so codesign (in the bundle script) + notarization can
      # use it. Inert unless all six secrets are present.
      - name: Import Developer ID certificate
        if: env.CAN_NOTARIZE == 'true'
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          # The decoded cert must never outlive this step, even on early failure.
          # (The keychain itself must persist — later steps sign against it.)
          trap 'rm -f "$RUNNER_TEMP/cert.p12"' EXIT
          kc="$RUNNER_TEMP/<KEYCHAIN_NAME>.keychain-db"
          kp="$(openssl rand -base64 24)"
          security create-keychain -p "$kp" "$kc"
          security set-keychain-settings -lut 21600 "$kc"
          security unlock-keychain -p "$kp" "$kc"
          echo "$MACOS_CERTIFICATE_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$kc" -P "$MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$kp" "$kc"
          # Prepend our keychain to the user search list, keeping the existing
          # ones; the command substitution must word-split into separate paths.
          # shellcheck disable=SC2046
          security list-keychains -d user -s "$kc" $(security list-keychains -d user | sed 's/"//g')
          rm -f "$RUNNER_TEMP/cert.p12"

      # Hand the identity to the repo's EXISTING bundle + DMG steps ONLY when
      # CAN_NOTARIZE — otherwise empty, so the bundle script takes its ad-hoc
      # path and the DMG keeps its first-launch note. Add this `env:` to both
      # the bundle step and the DMG-packaging step:
      #
      #   - name: <BUNDLE_STEP>            # e.g. "Build + bundle"
      #     env:
      #       <APP>_DEVELOPER_ID_IDENTITY: ${{ env.CAN_NOTARIZE == 'true' && secrets.<APP>_DEVELOPER_ID_IDENTITY || '' }}
      #     run: ...
      #   - name: <DMG_STEP>               # e.g. "Package DMG"
      #     env:
      #       <APP>_DEVELOPER_ID_IDENTITY: ${{ env.CAN_NOTARIZE == 'true' && secrets.<APP>_DEVELOPER_ID_IDENTITY || '' }}
      #     run: ...

      # AFTER the DMG is built, BEFORE upload-to-Release + any EdDSA sign_update
      # (stapling rewrites the DMG bytes). Gated so it never tries to notarize an
      # ad-hoc DMG.
      - name: Notarize + staple (skipped without credentials)
        if: env.CAN_NOTARIZE == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: <NOTARIZE_SCRIPT> "<DMG_PATH_EXPR>"

      # Gate first-launch / release-note guidance on the REAL artifact state —
      # a Developer-ID-signed but un-notarized DMG is still Gatekeeper-blocked,
      # so "cert exists" is the wrong signal. Reference
      # ${{ steps.dmg_notarized.outputs.value }} from the create-release notes.
      - name: Detect DMG notarization status
        id: dmg_notarized
        run: |
          if xcrun stapler validate "<DMG_PATH_EXPR>" >/dev/null 2>&1; then
            echo "value=true" >> "$GITHUB_OUTPUT"
          else
            echo "value=false" >> "$GITHUB_OUTPUT"
          fi
